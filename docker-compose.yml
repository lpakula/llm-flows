services:
  db:
    image: postgres:17-alpine
    container_name: llmflows-db
    environment:
      POSTGRES_DB: llmflows
      POSTGRES_USER: llmflows
      POSTGRES_PASSWORD: llmflows
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${LLMFLOWS_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmflows"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmflows-orchestrator
    command: ["ui", "--host", "0.0.0.0"]
    ports:
      - "${LLMFLOWS_PORT:-4300}:4300"
    volumes:
      - ${LLMFLOWS_HOME:-~/.llmflows}:/root/.llmflows
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - LLMFLOWS_HOME=/root/.llmflows
      - LLMFLOWS_HOST_HOME=${LLMFLOWS_HOST_HOME:-/Users/lukasz/.llmflows}
      - DATABASE_URL=postgresql://llmflows:llmflows@db:5432/llmflows
      - LLMFLOWS_DOCKER_NETWORK=llm-flows_default
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
