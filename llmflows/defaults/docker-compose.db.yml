# Bundled Postgres for llmflows (started automatically by `llmflows ui`).
# The DB joins the runner network so containers reach it as llmflows-db:5432.

services:
  db:
    image: postgres:17-alpine
    container_name: llmflows-db
    environment:
      POSTGRES_DB: llmflows
      POSTGRES_USER: llmflows
      POSTGRES_PASSWORD: llmflows
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${LLMFLOWS_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmflows"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - runners

networks:
  runners:
    name: llmflows-runners
    external: true

volumes:
  pgdata:
