                  </template>
                </div>
              </template>
            </div>

            <!-- System steps note -->
            <div class="text-xs text-gray-600 mb-6 bg-gray-900/50 border border-gray-800 rounded-lg p-3">
              System steps <span class="text-cyan-600">start</span> (beginning) and <span class="text-cyan-600">complete</span> (end) are auto-injected and not shown here.
            </div>

            <!-- Add Step Modal -->
            <div x-show="showAddStep" x-transition.opacity class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" @click.self="showAddStep = false">
              <div class="bg-gray-900 rounded-2xl p-6 w-full max-w-md border border-gray-700" @click.stop>
                <h2 class="text-lg font-semibold mb-4">Add Step</h2>
                <form @submit.prevent="addStep()">
                  <div class="space-y-4">
                    <div>
                      <label class="block text-sm text-gray-400 mb-1">Name</label>
                      <input x-model="newStep.name" required
                             class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                             placeholder="e.g. review">
                    </div>
                    <div>
                      <label class="block text-sm text-gray-400 mb-1">Position (optional)</label>
                      <input x-model="newStep.position" type="number"
                             class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                             placeholder="Auto (end)">
                    </div>
                    <div>
                      <label class="block text-sm text-gray-400 mb-1">Content (Markdown)</label>
                      <textarea x-model="newStep.content" rows="8"
                                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="# Step Name\n\n## PURPOSE\n..."></textarea>
                    </div>
                    <div>
                      <div class="flex items-center gap-2 mb-2">
                        <label class="block text-sm text-gray-400">IF Conditions</label>
                        <span class="text-xs text-gray-600">optional — all must exit 0 or step is skipped</span>
                      </div>
                      <template x-for="(cond, ci) in newStep.ifs" :key="ci">
                        <div class="flex gap-2 mb-2">
                          <input x-model="cond.command" placeholder="command, e.g. test -f package.json"
                                 class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-purple-500">
                          <input x-model="cond.message" placeholder="description"
                                 class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-purple-500">
                          <button type="button" @click="removeIf(newStep, ci)" class="text-xs text-red-400 hover:text-red-300 px-1">&times;</button>
                        </div>
                      </template>
                      <button type="button" @click="addIf(newStep)" class="text-xs text-purple-400 hover:text-purple-300">+ Add if</button>
                    </div>
                    <div>
                      <div class="flex items-center gap-2 mb-2">
                        <label class="block text-sm text-gray-400">Gates</label>
                        <span class="text-xs text-gray-600">optional</span>
                      </div>
                      <template x-for="(gate, gi) in newStep.gates" :key="gi">
                        <div class="flex gap-2 mb-2">
                          <input x-model="gate.command" placeholder="command"
                                 class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-amber-500">
                          <input x-model="gate.message" placeholder="failure message"
                                 class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-amber-500">
                          <button type="button" @click="removeGate(newStep, gi)" class="text-xs text-red-400 hover:text-red-300 px-1">&times;</button>
                        </div>
                      </template>
                      <button type="button" @click="addGate(newStep)" class="text-xs text-amber-400 hover:text-amber-300">+ Add gate</button>
                      <p class="text-xs text-gray-600 mt-2">Variables: <code class="text-amber-500/70">{{run.id}}</code> <code class="text-amber-500/70">{{task.id}}</code> <code class="text-amber-500/70">{{flow.name}}</code></p>
                    </div>
                  </div>
                  <div class="flex justify-end gap-3 mt-6">
                    <button type="button" @click="showAddStep = false"
                            class="px-4 py-2 text-sm text-gray-400 hover:text-gray-200 transition">Cancel</button>
                    <button type="submit"
                            class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition">Add</button>
                  </div>
                </form>
              </div>
            </div>

          </div>
        </template>

        <div x-show="!flow" class="text-gray-500 text-center py-12">Loading flow...</div>
      </div>
    </template>

    <!-- History View -->
    <template x-if="$store.router.view === 'history'">
      <div class="flex-1 overflow-y-auto p-6" x-data="historyView()" x-init="init()" @destroy.window="destroy && destroy()">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-semibold">History</h2>
          <div class="flex items-center gap-3">
            <select x-model="filterStatus" @change="offset = 0"
                    class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">All statuses</option>
              <option value="running">Running</option>
              <option value="queued">Queued</option>
              <option value="completed">Completed</option>
              <option value="failed">Failed</option>
              <option value="cancelled">Cancelled</option>
              <option value="timeout">Timeout</option>
            </select>
            <span class="text-xs text-gray-500" x-text="pageInfo"></span>
            <button @click="prevPage()" :disabled="!hasPrev"
                    :class="!hasPrev ? 'opacity-30 cursor-not-allowed' : 'hover:text-gray-200'"
                    class="text-xs text-gray-500 transition">&larr; Prev</button>
            <button @click="nextPage()" :disabled="!hasMore"
                    :class="!hasMore ? 'opacity-30 cursor-not-allowed' : 'hover:text-gray-200'"
                    class="text-xs text-gray-500 transition">Next &rarr;</button>
          </div>
        </div>

        <div x-show="loading" class="text-gray-500 text-center py-12">Loading...</div>
        <div x-show="!loading && runs.length === 0" class="text-center py-12 text-gray-600">No runs found</div>

        <div x-show="!loading && runs.length > 0" class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
          <table class="w-full table-fixed text-sm">
            <thead>
              <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-wide">
                <th class="px-4 py-3 text-left w-8"></th>
                <th class="px-4 py-3 text-left">Status</th>
                <th class="px-4 py-3 text-left">Task</th>
                <th class="px-4 py-3 text-left">Project</th>
                <th class="px-4 py-3 text-left">Flow</th>
                <th class="px-4 py-3 text-left">Agent / Model</th>
                <th class="px-4 py-3 text-left">Duration</th>
                <th class="px-4 py-3 text-left">Date</th>
                <th class="px-4 py-3 text-right">Actions</th>
              </tr>
            </thead>
            <template x-for="run in filteredRuns()" :key="run.id">
              <tbody>
                <tr class="border-b border-gray-800/50 hover:bg-gray-800/20 cursor-pointer transition"
                    :class="run.status === 'running' ? 'bg-yellow-900/5' : ''"
                    @click="toggleRun(run.id)">
                  <td class="px-4 py-3 w-4">
                    <span class="w-2 h-2 rounded-full inline-block" :class="statusDot(run)"></span>
                  </td>
                  <td class="px-4 py-3">
                    <div class="flex items-center gap-2">
                      <span class="text-xs px-2 py-0.5 rounded" :class="statusBadge(displayStatus(run))"
                            x-text="displayStatus(run)"></span>
                      <span class="text-[10px] font-mono text-gray-600" x-text="run.id"></span>
                    </div>
                  </td>
                  <td class="px-4 py-3">
                    <button @click.stop="goToTask(run.task_id)"
                            class="text-sm text-gray-200 hover:text-blue-400 transition truncate max-w-[160px] block text-left"
                            x-text="run.task_name || run.task_id"></button>
                    <div class="text-[10px] font-mono text-gray-600 mt-0.5" x-text="run.id"></div>
                  </td>
                  <td class="px-4 py-3">
                    <button @click.stop="goToProject(run)"
                            class="text-xs text-gray-400 hover:text-blue-400 transition truncate max-w-[120px] block text-left"
                            x-text="run.project_name || run.project_id"></button>
                  </td>
                  <td class="px-4 py-3 text-xs text-cyan-400">
                    <template x-if="run.flow_chain && JSON.parse(run.flow_chain || '[]').length > 1">
                      <div class="flex flex-wrap gap-1 items-center">
                        <template x-for="(fn, fi) in JSON.parse(run.flow_chain)" :key="fi">
                          <span class="flex items-center gap-1">
                            <span :class="fn === run.flow_name ? 'text-cyan-300 font-semibold' : 'text-gray-500'" x-text="fn"></span>
                            <span x-show="fi < JSON.parse(run.flow_chain).length - 1" class="text-gray-700">&rarr;</span>
                          </span>
                        </template>
                      </div>
                    </template>
                    <template x-if="!run.flow_chain || JSON.parse(run.flow_chain || '[]').length <= 1">
                      <span x-text="run.flow_name"></span>
                    </template>
                  </td>
                  <td class="px-4 py-3 text-xs text-gray-500">
                    <span x-text="(run.agent || 'cursor')"></span>
                    <span class="text-gray-700">/</span>
                    <span x-text="run.model || '-'"></span>
                  </td>
                  <td class="px-4 py-3 text-xs text-gray-500 whitespace-nowrap" x-text="duration(run)"></td>
                  <td class="px-4 py-3 text-xs text-gray-600 whitespace-nowrap"
                      x-text="run.created_at ? new Date(run.created_at).toLocaleString() : '-'"></td>
                  <td class="px-4 py-3 text-right" @click.stop>
                    <button @click="if (streamingRunId === run.id) { stopLogStream(); streamingRunId = null; } else { expandedRun = run.id; loadRunSteps(run.id); viewRunLogs(run.id); }"
                            x-show="run.log_path"
                            class="text-xs transition"
                            :class="streamingRunId === run.id ? 'text-yellow-400 hover:text-yellow-300' : 'text-blue-400 hover:text-blue-300'"
                            x-text="streamingRunId === run.id ? 'Hide Logs' : 'Logs'"></button>
                    <button @click="goToTask(run.task_id)"
                            class="text-xs text-gray-500 hover:text-gray-300 transition ml-2">Task</button>
                  </td>
                </tr>
                <!-- Expanded row: summary + logs -->
                <template x-if="expandedRun === run.id">
                  <tr class="border-b border-gray-800/30">
                    <td colspan="9" class="px-4 py-4 bg-gray-950/50">
                      <div x-show="run.user_prompt" class="mb-3" x-data="{ promptExpanded: false }">
                        <div class="text-[10px] uppercase tracking-wide text-gray-600 mb-1">Prompt</div>
                        <div class="relative">
                          <div class="prose prose-invert max-w-none text-gray-300 text-xs leading-relaxed bg-gray-900 rounded-lg p-3
                                      [&_h1]:text-base [&_h1]:font-bold [&_h1]:text-white [&_h1]:mt-4 [&_h1]:mb-2
                                      [&_h2]:text-sm [&_h2]:font-semibold [&_h2]:text-gray-100 [&_h2]:mt-3 [&_h2]:mb-1.5
                                      [&_h3]:text-xs [&_h3]:font-semibold [&_h3]:text-gray-200 [&_h3]:mt-2.5 [&_h3]:mb-1
                                      [&_p]:my-1.5 [&_p]:text-gray-300
                                      [&_ul]:my-1.5 [&_ul]:pl-4 [&_ul]:space-y-0.5
                                      [&_ol]:my-1.5 [&_ol]:pl-4 [&_ol]:space-y-0.5
                                      [&_li]:text-gray-300
                                      [&_code]:bg-gray-800 [&_code]:text-cyan-300 [&_code]:px-1.5 [&_code]:py-0.5 [&_code]:rounded [&_code]:text-[11px] [&_code]:font-mono
                                      [&_pre]:bg-gray-800 [&_pre]:border [&_pre]:border-gray-700 [&_pre]:rounded-lg [&_pre]:p-3 [&_pre]:my-2 [&_pre]:overflow-x-auto
                                      [&_pre_code]:bg-transparent [&_pre_code]:text-green-300 [&_pre_code]:p-0 [&_pre_code]:text-[11px]
                                      [&_strong]:text-gray-100 [&_strong]:font-semibold
                                      [&_a]:text-blue-400 [&_a]:underline"
                               :class="promptExpanded ? 'max-h-96 overflow-y-auto' : 'max-h-20 overflow-hidden'"
                               x-html="marked.parse(run.user_prompt || '')"></div>
                          <div x-show="!promptExpanded && (run.user_prompt || '').length > 200"
                               class="absolute bottom-0 left-0 right-0 h-8 bg-gradient-to-t from-gray-900 to-transparent rounded-b-lg pointer-events-none"></div>
                        </div>
                        <button x-show="(run.user_prompt || '').length > 200"
                                @click="promptExpanded = !promptExpanded"
                                class="text-xs text-blue-400 hover:text-blue-300 mt-1 hover:underline"
                                x-text="promptExpanded ? 'Show less' : 'Show more'"></button>
                      </div>
                      <div x-show="run.summary" class="mb-3">
                        <div class="text-[10px] uppercase tracking-wide text-gray-600 mb-1">Summary</div>
                        <div class="prose prose-invert max-w-none text-gray-300 text-xs leading-relaxed
                                    [&_h1]:text-base [&_h1]:font-bold [&_h1]:text-white [&_h1]:mt-4 [&_h1]:mb-2
                                    [&_h2]:text-sm [&_h2]:font-semibold [&_h2]:text-gray-100 [&_h2]:mt-3 [&_h2]:mb-1.5
                                    [&_h3]:text-xs [&_h3]:font-semibold [&_h3]:text-gray-200 [&_h3]:mt-2.5 [&_h3]:mb-1
                                    [&_p]:my-1.5 [&_p]:text-gray-300
                                    [&_ul]:my-1.5 [&_ul]:pl-4 [&_ul]:space-y-0.5
                                    [&_ol]:my-1.5 [&_ol]:pl-4 [&_ol]:space-y-0.5
                                    [&_li]:text-gray-300
                                    [&_code]:bg-gray-800 [&_code]:text-cyan-300 [&_code]:px-1.5 [&_code]:py-0.5 [&_code]:rounded [&_code]:text-[11px] [&_code]:font-mono
                                    [&_pre]:bg-gray-800 [&_pre]:border [&_pre]:border-gray-700 [&_pre]:rounded-lg [&_pre]:p-3 [&_pre]:my-2 [&_pre]:overflow-x-auto
                                    [&_pre_code]:bg-transparent [&_pre_code]:text-green-300 [&_pre_code]:p-0 [&_pre_code]:text-[11px]
                                    [&_strong]:text-gray-100 [&_strong]:font-semibold
                                    [&_a]:text-blue-400 [&_a]:underline"
                             x-html="marked.parse(run.summary || '')"></div>
                      </div>
                      <!-- Step Progress Bar -->
                      <template x-if="runSteps[run.id] && runSteps[run.id].length > 0">
                        <div class="mb-4">
                          <div class="text-[10px] uppercase tracking-wide text-gray-600 mb-2">Steps</div>
                          <div class="flex items-center overflow-x-auto pb-2 gap-0">
                            <template x-for="(step, si) in runSteps[run.id]" :key="si">
                              <div class="flex items-center shrink-0">
                                <div class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-md border text-[11px]"
                                     :class="stepBoxClass(step.status)"
                                     :title="step.name + ' (' + step.status + ')'">
                                  <template x-if="step.status === 'completed'">
                                    <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                                  </template>
                                  <template x-if="step.status === 'current'">
                                    <span class="w-1.5 h-1.5 rounded-full bg-current animate-pulse shrink-0"></span>
                                  </template>
                                  <template x-if="step.status === 'skipped'">
                                    <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>
                                  </template>
                                  <span :class="step.status === 'skipped' ? 'line-through' : ''" x-text="step.name"></span>
                                  <span x-show="step.has_ifs" class="text-[8px] text-purple-400 font-medium">IF</span>
                                </div>
                                <template x-if="si < runSteps[run.id].length - 1">
                                  <div class="w-3 h-[2px] shrink-0" :class="stepConnectorClass(step.status)"></div>
                                </template>
                              </div>
                            </template>
                          </div>
                        </div>
                      </template>

                      <!-- Logs viewer -->
                      <div x-show="streamingRunId === run.id">
                        <div class="flex items-center justify-between mb-2">
                          <span class="text-[10px] uppercase tracking-wide text-gray-600 flex items-center gap-2">
                            Agent Log
                            <span x-show="logStreaming" class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                          </span>
                          <div class="flex items-center gap-3">
                            <button @click.stop="copyLogs()" class="text-[10px] text-gray-500 hover:text-gray-300 transition" x-text="logsCopied ? 'Copied!' : 'Copy logs'"></button>
                            <button @click.stop="stopLogStream(); streamingRunId = null"
                                    class="text-xs text-gray-500 hover:text-gray-300 transition">Close</button>
                          </div>
                        </div>
                        <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
                          <div x-ref="logScroll"
                               @scroll="logAtBottom = ($el.scrollTop + $el.clientHeight >= $el.scrollHeight - 30)"
                               class="overflow-y-auto font-mono text-xs p-3 space-y-1 max-h-80 break-all">
                            <template x-for="(entry, i) in logEntries" :key="i">
                              <div>
                                <div x-show="entry.type !== 'output'" :class="entry.cls">
                                  <span x-text="entry.text"></span>
                                </div>
                                <div x-show="entry.type === 'output'" class="mt-0.5">
                                  <template x-if="!entry.expanded">
                                    <div>
                                      <template x-for="(line, li) in entry.lines.slice(0, 8)" :key="li">
                                        <div class="text-gray-500 pl-4" x-text="line"></div>
                                      </template>
                                      <button x-show="entry.lines.length > 8"
                                              @click="entry.expanded = true"
                                              class="text-gray-600 hover:text-gray-400 pl-4 mt-0.5 underline underline-offset-2">
                                        + <span x-text="entry.lines.length - 8"></span> more lines
                                      </button>
                                    </div>
                                  </template>
                                  <template x-if="entry.expanded">
                                    <div>
                                      <template x-for="(line, li) in entry.lines" :key="li">
                                        <div class="text-gray-500 pl-4" x-text="line"></div>
                                      </template>
                                      <button @click="entry.expanded = false"
                                              class="text-gray-600 hover:text-gray-400 pl-4 mt-0.5 underline underline-offset-2">
                                        &uarr; Collapse
                                      </button>
                                    </div>
                                  </template>
                                </div>
                              </div>
                            </template>
                            <div x-show="logEntries.length === 0 && logStreaming" class="text-gray-600 italic">Connecting...</div>
                          </div>
                        </div>
                      </div>
                      <!-- Quick action to toggle logs -->
                      <div x-show="run.log_path" class="mt-2">
                        <button @click.stop="if (streamingRunId === run.id) { stopLogStream(); streamingRunId = null; } else { loadRunSteps(run.id); viewRunLogs(run.id); }"
                                class="text-xs transition"
                                :class="streamingRunId === run.id ? 'text-yellow-400 hover:text-yellow-300' : 'text-blue-400 hover:text-blue-300'"
                                x-text="streamingRunId === run.id ? 'Hide Logs' : 'View Logs'"></button>
                      </div>
                    </td>
                  </tr>
                </template>
              </tbody>
            </template>
          </table>
        </div>

        <!-- Pagination footer -->
        <div x-show="total > limit" class="flex items-center justify-between mt-4">
          <span class="text-xs text-gray-500" x-text="pageInfo"></span>
          <div class="flex gap-2">
            <button @click="prevPage()" :disabled="!hasPrev"
                    :class="!hasPrev ? 'opacity-30 cursor-not-allowed' : 'hover:bg-gray-700'"
                    class="text-xs px-3 py-1.5 bg-gray-800 rounded-lg transition">&larr; Previous</button>
            <button @click="nextPage()" :disabled="!hasMore"
                    :class="!hasMore ? 'opacity-30 cursor-not-allowed' : 'hover:bg-gray-700'"
                    class="text-xs px-3 py-1.5 bg-gray-800 rounded-lg transition">Next &rarr;</button>
          </div>
        </div>
      </div>
    </template>

    <!-- Agents View -->
    <template x-if="$store.router.view === 'agents'">
      <div class="flex-1 overflow-y-auto p-6" x-data="agentsView()" x-init="init()">
        <div class="mb-6">
          <h2 class="text-xl font-semibold mb-2">Agents</h2>
          <p class="text-sm text-gray-400">Coding agents that llmflows can orchestrate. Each agent is a CLI tool that receives a prompt and executes tasks autonomously in your codebase. <br>Only agents detected in your PATH are available for selection when starting a run.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <template x-for="a in agentList" :key="a.key">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
              <div class="flex items-center justify-between mb-3">
                <h3 class="font-medium text-white" x-text="a.label"></h3>
                <span class="text-[10px] uppercase px-1.5 py-0.5 rounded"
                      :class="a.available ? 'bg-green-900/50 text-green-300' : 'bg-red-900/50 text-red-300'"
                      x-text="a.available ? 'ready' : 'not found'"></span>
              </div>

              <div class="mb-3">
                <label class="block text-[10px] uppercase tracking-wide text-gray-500 mb-1">Command</label>
                <div class="bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 font-mono text-sm text-cyan-400" x-text="a.command"></div>
              </div>

              <div class="space-y-1.5 text-xs mb-3">
                <div class="flex items-center gap-2">
                  <span class="w-1.5 h-1.5 rounded-full" :class="a.binary_path ? 'bg-green-400' : 'bg-red-400'"></span>
                  <span class="text-gray-400" x-text="a.binary + ' binary'"></span>
                  <span class="text-gray-600 font-mono ml-auto truncate max-w-[180px]"
                        :title="a.binary_path || 'not found'"
                        x-text="a.binary_path || 'not found'"></span>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Integrations View -->
    <template x-if="$store.router.view === 'integrations'">
      <div class="flex-1 overflow-y-auto p-6" x-data="integrationsView()" x-init="init()" @destroy.window="destroy && destroy()">
        <div class="mb-6">
          <h2 class="text-xl font-semibold mb-2">GitHub Integration</h2>
          <p class="text-sm text-gray-400">Connect your GitHub repositories to trigger agent runs from issue comments. <br>When someone comments <code class="text-gray-300 bg-gray-800 px-1 rounded">@llmflows</code> on an issue, llmflows creates a task, queues a run, and posts results back to the issue. Optionally override defaults with <code class="text-gray-300 bg-gray-800 px-1 rounded">@llmflows --model [name] --flow [flow1,flow2] --agent [name]</code>.</p>
        </div>

        <!-- Token section -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 mb-6">
          <h3 class="text-sm font-medium text-gray-300 mb-3">GitHub Token</h3>
          <div class="flex items-center gap-3 mb-3">
            <span class="w-2 h-2 rounded-full" :class="hasToken ? 'bg-green-400' : 'bg-red-400'"></span>
            <span class="text-sm" :class="hasToken ? 'text-green-400' : 'text-red-400'"
                  x-text="hasToken ? 'Token configured' : 'No token'"></span>
            <span x-show="hasToken" class="text-xs text-gray-600 font-mono" x-text="maskedToken"></span>
          </div>
          <div class="flex gap-2">
            <input x-model="token" type="password" placeholder="ghp_... or paste token"
                   class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button @click="saveToken()" :disabled="!token"
                    :class="!token ? 'opacity-40 cursor-not-allowed' : 'hover:bg-blue-500'"
                    class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg transition">Save</button>
          </div>
          <p x-show="tokenSaved" class="text-xs text-green-400 mt-2">Token saved successfully</p>
          <p class="text-xs text-gray-600 mt-2">Token requires <code class="text-gray-500">repo</code> scope. Generate one at <code class="text-gray-500">github.com/settings/tokens</code>.</p>
        </div>

        <!-- Projects table -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-wide">
                <th class="px-4 py-3 text-left">Project</th>
                <th class="px-4 py-3 text-left">Repository</th>
                <th class="px-4 py-3 text-center">Polling</th>
                <th class="px-4 py-3 text-left">Last Polled</th>
                <th class="px-4 py-3 text-right">Actions</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="p in projects" :key="p.id">
                <tr class="border-b border-gray-800/50 hover:bg-gray-800/20 transition">
                  <td class="px-4 py-3 font-medium text-gray-200" x-text="p.name"></td>
                  <td class="px-4 py-3 text-xs font-mono text-cyan-400" x-text="getRepo(p.id) || '-'"></td>
                  <td class="px-4 py-3 text-center">
                    <button @click="toggleEnabled(p.id)"
                            class="w-10 h-5 rounded-full transition relative"
                            :class="isEnabled(p.id) ? 'bg-green-600' : 'bg-gray-700'">
                      <span class="absolute top-0.5 w-4 h-4 rounded-full bg-white transition-all"
                            :class="isEnabled(p.id) ? 'left-5' : 'left-0.5'"></span>
                    </button>
                  </td>
                  <td class="px-4 py-3 text-xs text-gray-500" x-text="getLastPolled(p.id)"></td>
                  <td class="px-4 py-3 text-right">
                    <button @click="detectRepo(p.id)"
                            class="text-xs text-blue-400 hover:text-blue-300 transition">Detect Repo</button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
          <div x-show="projects.length === 0" class="px-4 py-8 text-center text-gray-600">No projects registered</div>
        </div>
      </div>
    </template>

    <!-- Settings View -->
    <template x-if="$store.router.view === 'settings'">
      <div class="flex-1 overflow-y-auto p-6" x-data="settingsView()" x-init="init()">
        <div class="mb-6">
          <h2 class="text-xl font-semibold mb-2">Settings</h2>
          <p class="text-sm text-gray-400">Configure daemon behavior. Changes are saved to <code class="text-gray-300 bg-gray-800 px-1 rounded">~/.llmflows/config.toml</code>. Stop and start the daemon to apply changes.</p>
        </div>

        <div x-show="loading" class="text-gray-500">Loading...</div>

        <div x-show="!loading" class="space-y-6 max-w-xl">
          <!-- Daemon Config -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <h3 class="text-sm font-medium text-gray-300 mb-4">Daemon</h3>

            <div class="space-y-4">
              <div>
                <label class="block text-xs text-gray-400 mb-1">Poll interval (seconds)</label>
                <input x-model.number="pollInterval" type="number" min="5" step="5"
                       class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-600 mt-1">How often the daemon checks for pending runs.</p>
              </div>

              <div>
                <label class="block text-xs text-gray-400 mb-1">Agent run timeout (minutes)</label>
                <input x-model.number="runTimeout" type="number" min="0" step="5"
                       class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-600 mt-1">Maximum time a run can take before being killed. Set to 0 to disable.</p>
              </div>

              <div>
                <label class="block text-xs text-gray-400 mb-1">Gate timeout (seconds)</label>
                <input x-model.number="gateTimeout" type="number" min="5" step="5"
                       class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-600 mt-1">Maximum time each gate command can run before timing out.</p>
              </div>
            </div>

            <div class="flex items-center gap-3 mt-5">
              <button @click="save()" :disabled="saving"
                      :class="saving ? 'opacity-40 cursor-not-allowed' : 'hover:bg-blue-500'"
                      class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg transition">
                <span x-text="saving ? 'Saving...' : 'Save'"></span>
              </button>
              <p x-show="saved" x-transition class="text-xs text-green-400">Saved</p>
            </div>
          </div>

        </div>
      </div>
    </template>

    <!-- Empty state (no view selected) -->
    <template x-if="!['dashboard','project','task','flows','flow-editor','history','agents','integrations','settings'].includes($store.router.view)">
      <div class="flex-1 flex items-center justify-center">
        <p class="text-gray-500 text-lg">Select a view from the sidebar</p>
      </div>
    </template>

  </div>

</body>
</html>
